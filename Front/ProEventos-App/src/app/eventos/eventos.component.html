<h1>Eventos</h1>
<hr>

<!--botão de pesquisa-->
<div class="form-inline">
  <div class="form-group mb-2">
    <label class="mr-2"> Filtro</label>
    <input type="text" class="form-control mr-2"
    placeholder="buscar"
    [(ngModel)]="filtroLista">
    <!--caixa de bananas [()]-->
  </div>
</div>

<table class="table table-striped">
  <thead class="thead-dark">
    <tr>

      <th>
        <button type="button"
        class="btn btn-outline-light btn-sm"
        (click)="exibeImg()">
        <i class="{{!exibirImg ? 'fa fa-eye' : 'fa fa-eye-slash'}}"></i>
        {{!exibirImg ? 'exibir' : 'ocultar'}}
        <!--if else simplificado-->
        </button>
      </th>

      <th>#</th>
      <th>Tema</th>
      <th>Local</th>
      <th>Data</th>
      <th>Qtd Pessoas</th>
      <th>Lote</th>
      <th>Opções</th>
    </tr>
  </thead>

  <!--For each diretiva ng-->
  <tbody *ngIf="eventos && eventos.length">
    <!--se o eventos existe-->
    <tr *ngFor="let evento of eventosFiltrados">

      <!--imagens-->
      <td>
        <img [collapse]="exibirImg"
            [isAnimated]="true"
            src="/assets/{{evento.imagemURL}}"
            [style.width.px]="larguraImg"
            [style.margin.px]="margemImg">
      </td>

      <!--{{interpolação}}-->
      <td>{{evento.id}}</td>
      <td>{{evento.tema}}</td>
      <td>{{evento.local}}</td>
      <td>{{evento.dataEvento | DateFormat}}</td>
      <td>{{evento.qtdPessoas}}</td>
      <td>{{evento.lotes[0].nome | uppercase}}</td>

      <!--botoes-->
      <td>
        <button type="button"
        class="btn btn-primary btn-sm mr-2" tooltip="Editar">
        <i class="fa fa-edit"></i>
        </button>

        <button type="button" class="btn btn-danger btn-sm" tooltip="Excluir"
        (click)="openModal(template)">
        <i class="fa fa-trash"></i>
        </button>
      </td>

    </tr>
  </tbody>
  <tfoot *ngIf="!eventos.length">
    <tr>
      <td colspan="8" class="text-center">
        <h4>nenhum evento encontrado</h4>
      </td>
    </tr>
  </tfoot>
</table>

<ng-template #template>
  <div class="modal-body text-center">
    <p>Tem certeza que quer deletar esse Evento?</p>
    <button type="button" class="btn btn-default" (click)="confirm()" >Sim</button>
    <button type="button" class="btn btn-primary" (click)="decline()" >Não</button>
  </div>
</ng-template>
